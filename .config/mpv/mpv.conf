# --- Core and Hardware ---
profile=gpu-next
hwdec=auto-safe
ytdl-format=bestvideo+bestaudio/best

# --- Color Management & Dithering ---
icc-profile-auto=yes
dither=error-diffusion
tone-mapping=bt.2446a

# --- Debanding ---
deband=no
deband-iterations=4
deband-threshold=35
deband-range=16
deband-grain=4

# --- Scaling and AI (Shaders & Algorithms) ---
glsl-shader="~~/shaders/KrigBilateral.glsl"
glsl-shader="~~/shaders/FSRCNNX_x2_16-0-4-1.glsl"
scale=ewa_lanczossharp
dscale=hermite

# --- Smoothness and Synchronization ---
video-sync=display-resample
interpolation=no